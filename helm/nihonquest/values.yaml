# Default values for NihongoQuest Helm Chart
# This is a YAML-formatted file

# Number of replicas
replicaCount: 2

# Container image configuration
image:
  repository: gcr.io/nihonselfpacepractic-flutter/nihonquest-web
  pullPolicy: IfNotPresent
  tag: "2.1.0"

# Image pull secrets (if using private registry)
imagePullSecrets: []

# Override the chart name
nameOverride: ""
fullnameOverride: ""

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: nihonselfpacepractic-flutter.web.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nihonquest-tls
      hosts:
        - nihonselfpacepractic-flutter.web.app

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Liveness probe
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Readiness probe
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# Firebase configuration
firebase:
  projectId: nihonselfpacepractic-flutter
  apiKey: ""  # Set via --set or values-prod.yaml
  authDomain: nihonselfpacepractic-flutter.firebaseapp.com
  storageBucket: nihonselfpacepractic-flutter.appspot.com
  messagingSenderId: ""
  appId: ""
  measurementId: ""

# Environment-specific configs
config:
  environment: production
  logLevel: info
  enableAnalytics: true
  maxUploadSize: "10MB"

# Monitoring (Prometheus)
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
