<script>
        const canvas = document.getElementById('practiceCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let paths = [];
        let currentPath = [];

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            redraw();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startDrawing(e) {
            isDrawing = true;
            currentPath = [];
            const pos = getPos(e);
            currentPath.push(pos);
            draw(e);
        }

        function stopDrawing() {
            if (isDrawing && currentPath.length > 0) {
                paths.push([...currentPath]);
            }
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            currentPath.push(pos);

            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#9c3f59';

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#9c3f59';

            paths.forEach(path => {
                ctx.beginPath();
                ctx.moveTo(path[0].x, path[0].y);
                path.forEach(point => {
                    ctx.lineTo(point.x, point.y);
                });
                ctx.stroke();
            });
        }

        function clearCanvas() {
            paths = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function undoLast() {
            paths.pop();
            redraw();
        }

        function checkWriting() {
            // Simulated evaluation logic
            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Evaluating...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">celebration</span> Sugoi! (Great!)';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-secondary');
                
                // Add a small sparkle effect or confetti here if desired
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.add('bg-primary');
                    btn.classList.remove('bg-secondary');
                    btn.disabled = false;
                }, 2000);
            }, 800);
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('touchend', stopDrawing);

    </script>
