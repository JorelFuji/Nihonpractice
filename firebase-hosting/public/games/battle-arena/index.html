<script>
        // Simple Romaji to Hiragana conversion mapping
        const romajiMap = {
            'a': 'あ', 'i': 'い', 'u': 'う', 'e': 'え', 'o': 'お',
            'ka': 'か', 'ki': 'き', 'ku': 'く', 'ke': 'け', 'ko': 'こ',
            'ga': 'が', 'gi': 'ぎ', 'gu': 'ぐ', 'ge': 'げ', 'go': 'ご',
            'sa': 'さ', 'si': 'し', 'su': 'す', 'se': 'せ', 'so': 'そ',
            'ta': 'た', 'ti': 'ち', 'tu': 'つ', 'te': 'て', 'to': 'と',
            'na': 'な', 'ni': 'に', 'nu': 'ぬ', 'ne': 'ね', 'no': 'の',
            'ha': 'は', 'hi': 'ひ', 'fu': 'ふ', 'he': 'へ', 'ho': 'ほ',
            'ma': 'ま', 'mi': 'み', 'mu': 'む', 'me': 'め', 'mo': 'も',
            'ya': 'や', 'yu': 'ゆ', 'yo': 'よ',
            'ra': 'ら', 'ri': 'り', 'ru': 'る', 're': 'れ', 'ro': 'ろ',
            'wa': 'わ', 'wo': 'を', 'n': 'ん'
        };

        function handleInput(el) {
            let val = el.value.toLowerCase();
            let converted = "";
            let i = 0;
            
            while (i < val.length) {
                let char2 = val.substring(i, i + 2);
                let char1 = val.substring(i, i + 1);
                
                if (romajiMap[char2]) {
                    converted += romajiMap[char2];
                    i += 2;
                } else if (romajiMap[char1]) {
                    converted += romajiMap[char1];
                    i += 1;
                } else {
                    converted += val[i];
                    i++;
                }
            }
            
            if (converted !== val) {
                el.value = converted;
            }
        }

        // Timer countdown
        let timeLeft = 10;
        const timerCircle = document.querySelector('circle.text-primary-fixed-dim');
        const timerText = document.querySelector('.font-display.text-primary-fixed-dim');
        
        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) timeLeft = 10;
            
            timerText.innerText = timeLeft;
            const offset = (138.2 * (10 - timeLeft)) / 10;
            timerCircle.style.strokeDashoffset = offset;
            
            if (timeLeft <= 3) {
                timerCircle.classList.replace('text-primary-fixed-dim', 'text-error');
                timerText.classList.replace('text-primary-fixed-dim', 'text-error');
            } else {
                timerCircle.classList.replace('text-error', 'text-primary-fixed-dim');
                timerText.classList.replace('text-error', 'text-primary-fixed-dim');
            }
        }, 1000);
    </script>
