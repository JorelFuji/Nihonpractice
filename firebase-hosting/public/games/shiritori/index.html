<canvas id="shader-canvas-ANIMATION_8" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_8');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `
precision highp float;
uniform float u_time;
uniform vec2 u_resolution;

varying vec2 v_texCoord;

void main() {
    vec2 uv = v_texCoord;
    
    // Create a stylized "Kawaii" grid/battleground background
    vec3 color1 = vec3(0.1, 0.05, 0.03); // Deep brown (from design system)
    vec3 color2 = vec3(1.0, 0.54, 0.0);  // Primary orange
    
    float pulse = (sin(u_time * 1.5) * 0.5 + 0.5);
    
    // Soft vignette
    float dist = distance(uv, vec2(0.5));
    float vignette = 1.0 - smoothstep(0.2, 0.8, dist);
    
    // Grid lines
    float gridWidth = 0.02;
    vec2 grid = abs(fract(uv * 10.0 - 0.5) - 0.5);
    float line = smoothstep(0.0, gridWidth, min(grid.x, grid.y));
    
    vec3 finalColor = mix(color1, color2 * 0.1, 1.0 - line);
    finalColor += color2 * 0.05 * pulse * vignette;
    
    gl_FragColor = vec4(finalColor * vignette, 1.0);
}
`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xff8a00, 1, 100);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Pokémon-style Battle Platform (Cylinder)
const geoPlatform = new THREE.CylinderGeometry(2, 2.2, 0.2, 32);
const matPlatform = new THREE.MeshPhongMaterial({ color: 0xff8a00, transparent: true, opacity: 0.8 });
const platform = new THREE.Mesh(geoPlatform, matPlatform);
platform.position.y = -1;
scene.add(platform);

// Player Side (Blue-ish cube as proxy for character)
const geoPlayer = new THREE.BoxGeometry(0.8, 0.8, 0.8);
const matPlayer = new THREE.MeshPhongMaterial({ color: 0x4fc3f7 });
const playerChar = new THREE.Mesh(geoPlayer, matPlayer);
playerChar.position.set(-1.5, -0.5, 0);
scene.add(playerChar);

// Opponent Side (Pink-ish cube as proxy for character)
const geoEnemy = new THREE.BoxGeometry(0.8, 0.8, 0.8);
const matEnemy = new THREE.MeshPhongMaterial({ color: 0xf06292 });
const enemyChar = new THREE.Mesh(geoEnemy, matEnemy);
enemyChar.position.set(1.5, -0.5, 0);
scene.add(enemyChar);

camera.position.set(0, 1, 6);
camera.lookAt(0, 0, 0);

function animate() {
    requestAnimationFrame(animate);
    
    // Idle animations
    playerChar.position.y = -0.5 + Math.sin(Date.now() * 0.005) * 0.1;
    enemyChar.position.y = -0.5 + Math.cos(Date.now() * 0.005) * 0.1;
    
    playerChar.rotation.y += 0.01;
    enemyChar.rotation.y -= 0.01;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const newWidth = container.clientWidth || window.innerWidth;
    const newHeight = container.clientHeight || window.innerHeight;
    camera.aspect = newWidth / newHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(newWidth, newHeight);
});

animate();

})();
</script>

<script>
        // Simple Romaji to Hiragana conversion mapping (Subset for demo)
        const romajiMap = {
            'a': 'あ', 'i': 'い', 'u': 'う', 'e': 'え', 'o': 'お',
            'ka': 'か', 'ki': 'き', 'ku': 'く', 'ke': 'け', 'ko': 'こ',
            'ga': 'が', 'gi': 'ぎ', 'gu': 'ぐ', 'ge': 'げ', 'go': 'ご',
            'sa': 'さ', 'si': 'し', 'su': 'す', 'se': 'せ', 'so': 'そ',
            'ta': 'た', 'ti': 'ち', 'tu': 'つ', 'te': 'て', 'to': 'と',
            'na': 'な', 'ni': 'に', 'nu': 'ぬ', 'ne': 'ね', 'no': 'の',
            'ha': 'は', 'hi': 'ひ', 'fu': 'ふ', 'he': 'へ', 'ho': 'ほ',
            'ma': 'ま', 'mi': 'み', 'mu': 'む', 'me': 'め', 'mo': 'も',
            'ya': 'や', 'yu': 'ゆ', 'yo': 'よ',
            'ra': 'ら', 'ri': 'り', 'ru': 'る', 're': 'れ', 'ro': 'ろ',
            'wa': 'わ', 'wo': 'を', 'n': 'ん'
        };

        function handleInput(el) {
            let val = el.value.toLowerCase();
            let converted = "";
            let i = 0;
            
            while (i < val.length) {
                let char2 = val.substring(i, i + 2);
                let char1 = val.substring(i, i + 1);
                
                if (romajiMap[char2]) {
                    converted += romajiMap[char2];
                    i += 2;
                } else if (romajiMap[char1]) {
                    converted += romajiMap[char1];
                    i += 1;
                } else {
                    converted += val[i];
                    i++;
                }
            }
            
            if (converted !== val) {
                el.value = converted;
            }
        }

        // Timer countdown simulation
        let timeLeft = 10;
        const timerCircle = document.querySelector('circle.text-primary');
        const timerText = document.querySelector('.absolute.font-label-caps.text-primary');
        
        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) timeLeft = 10;
            
            timerText.innerText = timeLeft;
            const offset = (125.6 * (10 - timeLeft)) / 10;
            timerCircle.style.strokeDashoffset = offset;
            
            // Critical alert
            if (timeLeft <= 3) {
                timerCircle.classList.replace('text-primary', 'text-error');
                timerText.classList.replace('text-primary', 'text-error');
            } else {
                timerCircle.classList.replace('text-error', 'text-primary');
                timerText.classList.replace('text-error', 'text-primary');
            }
        }, 1000);
    </script>
