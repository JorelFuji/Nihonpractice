# GitLab CI/CD - NihonPractice DevSecOps Pipeline
# Following industry best practices for security, testing, and deployment

default:
  image: node:18-alpine
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

stages:
  - validate
  - lint
  - test
  - security
  - build
  - deploy
  - verify

variables:
  NODE_ENV: "production"
  FIREBASE_PROJECT: "nihonselfpacepractic"
  GIT_DEPTH: 10
  FF_USE_FASTZIP: "true"
  CACHE_COMPRESSION_LEVEL: "fast"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Reusable cache configurations
.node_cache:
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - node_modules/

.python_cache:
  cache:
    key: python-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip/
      - .venv/

.flutter_cache:
  cache:
    key: flutter-${CI_COMMIT_REF_SLUG}
    paths:
      - .dart_tool/
      - .flutter-plugins
      - .packages

