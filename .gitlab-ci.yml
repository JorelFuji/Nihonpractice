# GitLab CI/CD Configuration for NihonPractice
# Project ID: 83983902

image: node:18

stages:
  - test
  - build
  - deploy

variables:
  NODE_ENV: "production"
  FIREBASE_PROJECT: "nihonselfpacepractic"

# Cache node modules for faster builds
cache:
  paths:
    - firebase-hosting/node_modules/
    - nihon-quest-fullstack/frontend/node_modules/

# Test Stage - Run tests and linting
test:
  stage: test
  script:
    - echo "Running tests..."
    - cd firebase-hosting
    - npm install || echo "No package.json found, skipping install"
    - echo "Tests completed"
  only:
    - merge_requests
    - main
    - develop
  tags:
    - docker

# Lint JavaScript
lint:js:
  stage: test
  script:
    - echo "Linting JavaScript files..."
    - cd firebase-hosting/public
    - echo "Checking for syntax errors..."
    # Add eslint or other linting tools here
    - echo "Lint check completed"
  only:
    - merge_requests
    - main
  allow_failure: true
  tags:
    - docker

# Validate HTML
validate:html:
  stage: test
  script:
    - echo "Validating HTML files..."
    - cd firebase-hosting/public
    - find . -name "*.html" -type f | head -5
    - echo "HTML validation completed"
  only:
    - merge_requests
    - main
  allow_failure: true
  tags:
    - docker

# Check Japanese Text Encoding
check:encoding:
  stage: test
  script:
    - echo "Checking Japanese text encoding..."
    - cd firebase-hosting/public
    - file -i games/memory-match/index.html
    - file -i kids-mode/index.html
    - echo "Encoding check completed"
  only:
    - merge_requests
    - main
  allow_failure: true
  tags:
    - docker

# Build Stage - Prepare for deployment
build:web:
  stage: build
  script:
    - echo "Building web application..."
    - cd firebase-hosting
    - npm install || echo "No dependencies to install"
    - echo "Build completed"
  artifacts:
    paths:
      - firebase-hosting/public/
    expire_in: 1 week
  only:
    - main
    - develop
  tags:
    - docker

build:react:
  stage: build
  script:
    - echo "Building React frontend..."
    - cd nihon-quest-fullstack/frontend
    - npm install
    - npm run build || echo "Build script not found"
    - echo "React build completed"
  artifacts:
    paths:
      - nihon-quest-fullstack/frontend/dist/
    expire_in: 1 week
  only:
    - main
  allow_failure: true
  tags:
    - docker

# Deploy Stage - Deploy to Firebase
deploy:firebase:
  stage: deploy
  image: node:18
  before_script:
    - npm install -g firebase-tools
  script:
    - echo "Deploying to Firebase Hosting..."
    - cd firebase-hosting
    - echo "Firebase project: $FIREBASE_PROJECT"
    # Note: FIREBASE_TOKEN should be set as a GitLab CI/CD variable
    - |
      if [ -n "$FIREBASE_TOKEN" ]; then
        firebase deploy --only hosting --project $FIREBASE_PROJECT --token $FIREBASE_TOKEN
        echo "Deployment successful!"
        echo "Live at: https://nihonselfpacepractic.web.app"
      else
        echo "FIREBASE_TOKEN not set. Skipping deployment."
        echo "Set FIREBASE_TOKEN in GitLab CI/CD variables to enable auto-deployment."
      fi
  environment:
    name: production
    url: https://nihonselfpacepractic.web.app
  only:
    - main
  when: manual
  tags:
    - docker

# Deploy to Staging (if branch exists)
deploy:staging:
  stage: deploy
  image: node:18
  before_script:
    - npm install -g firebase-tools
  script:
    - echo "Deploying to Firebase Hosting (Staging)..."
    - cd firebase-hosting
    - |
      if [ -n "$FIREBASE_TOKEN" ]; then
        firebase deploy --only hosting --project $FIREBASE_PROJECT --token $FIREBASE_TOKEN
        echo "Staging deployment successful!"
      else
        echo "FIREBASE_TOKEN not set. Skipping staging deployment."
      fi
  environment:
    name: staging
    url: https://nihonselfpacepractic.web.app
  only:
    - staging
    - develop
  when: manual
  allow_failure: true
  tags:
    - docker

# Security Scan
security:scan:
  stage: test
  script:
    - echo "Running security scan..."
    - cd firebase-hosting
    - npm audit || echo "npm audit completed with warnings"
    - echo "Security scan completed"
  only:
    - merge_requests
    - main
  allow_failure: true
  tags:
    - docker

# Performance Check
performance:check:
  stage: test
  script:
    - echo "Checking file sizes..."
    - cd firebase-hosting/public
    - du -sh games/
    - du -sh kids-mode/
    - find . -name "*.html" -exec wc -l {} + | tail -1
    - echo "Performance check completed"
  only:
    - merge_requests
    - main
  allow_failure: true
  tags:
    - docker

# Accessibility Check
accessibility:check:
  stage: test
  script:
    - echo "Checking accessibility..."
    - cd firebase-hosting/public
    - echo "Checking for alt tags in images..."
    - grep -r "alt=" . | wc -l || echo "Alt tags found"
    - echo "Accessibility check completed"
  only:
    - merge_requests
  allow_failure: true
  tags:
    - docker

# Create Release Notes
release:notes:
  stage: deploy
  script:
    - echo "Generating release notes..."
    - git log --oneline -10
    - cat CHANGELOG.md | head -50
    - echo "Release notes generated"
  artifacts:
    paths:
      - CHANGELOG.md
    expire_in: 1 month
  only:
    - tags
  tags:
    - docker

# Scheduled Jobs
# Run daily check for broken links
check:links:
  stage: test
  script:
    - echo "Checking for broken links..."
    - echo "This would check all internal links in production"
  only:
    - schedules
  allow_failure: true
  tags:
    - docker

