# NihongoQuest - Docker Compose for Local Development
version: '3.8'

services:
  # Flutter Web App
  flutter-web:
    build:
      context: ..
      dockerfile: docker/flutter-web/Dockerfile
    container_name: nihonquest-web
    ports:
      - "8080:80"
    volumes:
      - ../nihon_quest_mobile:/app:ro
    environment:
      - FLUTTER_ENV=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - nihonquest-network
    restart: unless-stopped

  # Firebase Emulators (for local testing)
  firebase-emulators:
    image: node:18-alpine
    container_name: nihonquest-firebase-emulator
    working_dir: /app
    command: sh -c "npm install -g firebase-tools && firebase emulators:start"
    ports:
      - "4000:4000"   # Emulator UI
      - "8081:8080"   # Firestore
      - "9099:9099"   # Auth
      - "5001:5001"   # Functions
      - "9199:9199"   # Storage
    volumes:
      - ../nihon_quest_mobile:/app
      - firebase-data:/root/.cache/firebase/emulators
    environment:
      - FIREBASE_CONFIG=${FIREBASE_CONFIG}
    networks:
      - nihonquest-network
    restart: unless-stopped

networks:
  nihonquest-network:
    name: nihonquest-network
    driver: bridge

volumes:
  firebase-data:
    name: nihonquest-firebase-data
