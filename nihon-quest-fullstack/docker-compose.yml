version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nihonquest-db
    environment:
      POSTGRES_USER: nihonquest
      POSTGRES_PASSWORD: nihonquest_password
      POSTGRES_DB: nihonquest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nihonquest"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nihonquest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nihonquest-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://nihonquest:nihonquest_password@postgres:5432/nihonquest
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nihonquest-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: nihonquest-voicevox
    ports:
      - "50021:50021"
    volumes:
      - voicevox_data:/opt/voicevox

volumes:
  postgres_data:
  redis_data:
  voicevox_data:
